<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Macario Lite · Sistema de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components/styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="components/mock.js?v=10"></script>
  <script src="components/xlsx.js?v=10"></script>
  <script type="text/babel" src="components/shared.jsx?v=10"></script>
  <script type="text/babel" src="components/login.jsx?v=10"></script>
  <script type="text/babel" src="components/sidebar.jsx?v=10"></script>
  <script type="text/babel" src="components/dashboard.jsx?v=10"></script>
  <script type="text/babel" src="components/carrier.jsx?v=10"></script>
  <script type="text/babel" src="components/produccion.jsx?v=10"></script>
  <script type="text/babel" src="components/modals.jsx?v=10"></script>
  <script type="text/babel" src="components/pages.jsx?v=10"></script>
  <script type="text/babel" src="components/app.jsx?v=10"></script>

  <!-- Boot: espera a que todos los componentes Babel estén disponibles -->
  <script>
    (function boot() {
      if (window.App && window.LoginScreen && window.Sidebar && window.DashboardPage) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } else {
        setTimeout(boot, 40);
      }
    })();
  </script>
</body>
</html>
