server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml;

    # Headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ────────────────────────────────────────────────────────────────────
    # MOBILE PWA bajo /m/*
    # Tiene que ir ANTES del location / del desktop SPA
    # ────────────────────────────────────────────────────────────────────

    # /m sin slash → redirect a /m/
    location = /m {
        return 301 /m/;
    }

    location /m/ {
        alias /usr/share/nginx/html/m/;
        index index.html;
        try_files $uri $uri/ /m/index.html;

        # Service worker: NUNCA cachear. Si se cachea viejo, el browser
        # nunca actualiza la app.
        location ~ ^/m/(sw|registerSW)\.js$ {
            alias /usr/share/nginx/html/m/$1.js;
            expires off;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Manifest: pequeño cache pero no muy largo
        location = /m/manifest.webmanifest {
            alias /usr/share/nginx/html/m/manifest.webmanifest;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/manifest+json";
        }
    }

    # ────────────────────────────────────────────────────────────────────
    # DESKTOP SPA en /
    # ────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html: no cachear (para que el browser siempre traiga
        # el HTML nuevo con los hashes de assets actualizados)
        location = /index.html {
            expires off;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }
    }

    # ────────────────────────────────────────────────────────────────────
    # Assets con hash → cache agresivo (immutable)
    # Vite genera nombres tipo `index-a1b2c3d4.js` con hash, así que
    # son seguros de cachear por mucho tiempo.
    # ────────────────────────────────────────────────────────────────────
    location ~* ^/(m/)?assets/.*\.(js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }
}
