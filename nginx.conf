server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml;

    # Headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ────────────────────────────────────────────────────────────────────
    # MOBILE PWA bajo /m/*
    # ────────────────────────────────────────────────────────────────────
    location = /m {
        return 301 /m/;
    }

    location /m/ {
        alias /usr/share/nginx/html/m/;
        index index.html;
        try_files $uri $uri/ /m/index.html;

        # Service worker: nunca cachear
        location ~ ^/m/(sw|registerSW)\.js$ {
            alias /usr/share/nginx/html/m/$1.js;
            expires off;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        location = /m/manifest.webmanifest {
            alias /usr/share/nginx/html/m/manifest.webmanifest;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/manifest+json";
        }
    }

    # ────────────────────────────────────────────────────────────────────
    # DESKTOP en / — HTML+JSX+CSS estáticos cargados desde components/
    # No hay bundler. Babel-standalone compila JSX en el browser.
    # No cachear HTML/JSX/JS para que cambios se vean inmediatamente.
    # ────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html y "Macario Lite.html": sin cache
    location ~ ^/(index\.html|Macario%20Lite\.html|Macario\ Lite\.html)$ {
        expires off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # JSX/JS/CSS/data.js: cache corto (1 min) para que un push se vea rápido
    location ~ ^/components/.*\.(jsx|js|css)$ {
        expires 60s;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    # Mobile assets con hash → cache largo
    location ~* ^/m/assets/.*\.(js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }
}
